name: macOS build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: brew install cmake boost bison sse2neon sdl2 sdl2_image flex

      - name: Configure
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DDISCORD_ENABLED=OFF

      - name: Build engine-sim-app
        run: |
          export PATH="$(brew --prefix bison)/bin:$(brew --prefix flex)/bin:$PATH"
          cmake --build build --target engine-sim-app -j3

      - name: Package redline.app
        run: cmake --build build --target redline-app -j3

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: redline-app
          path: dist/redline.app
          if-no-files-found: error
